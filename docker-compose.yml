services:
  db-renfe:
    image: danidrq89/renfe:v1_31_03_2026
    container_name: db-renfe
    ports:
      - "3306:3306"
    networks:
      - renfe-network
    restart: always

  api-renfe:
    image: danidrq89/renfe-api:v1_31_03_2026__1
    container_name: api-renfe
    ports:
      - "8080:8080"
    networks:
      - renfe-network
    depends_on:
      - db-renfe
    restart: on-failure

networks:
  renfe-network:
    driver: bridge